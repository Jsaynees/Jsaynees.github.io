<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel del Profesor · Curso de Inducción</title>
<style>
  :root{--navy:#1B3A6B;--navy2:#274a83;--gold:#C9A84C;--ink:#22303f;--bg:#eef1f7;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Segoe UI',Arial,sans-serif;color:var(--ink);background:var(--bg);min-height:100vh;padding:16px;}
  .app{max-width:960px;margin:0 auto;}
  .hero{background:linear-gradient(135deg,#132749,#274a83);color:#fff;border-radius:14px;padding:20px 24px;}
  .hero .kick{color:var(--gold);font-size:12px;letter-spacing:2px;font-weight:bold;}
  .hero h1{font-size:22px;margin-top:4px;}
  .card{background:#fff;border-radius:14px;box-shadow:0 3px 12px rgba(0,0,0,.08);padding:20px;margin-top:16px;}
  .cfg{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;}
  .cfg .f{flex:1;min-width:220px;} .cfg label{display:block;font-size:13px;font-weight:600;color:var(--navy);margin-bottom:5px;}
  .cfg input{width:100%;padding:10px 12px;border:2px solid #d5dced;border-radius:9px;font-size:14px;font-family:inherit;}
  .btn{cursor:pointer;font-family:inherit;font-weight:bold;font-size:15px;border:none;border-radius:9px;padding:11px 20px;background:var(--navy);color:#fff;}
  .btn:active{transform:translateY(1px);}
  h2{color:var(--navy);font-size:18px;margin:4px 0 12px;}
  .tiles{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:16px;}
  .tile{background:#f7f9fc;border-radius:12px;padding:14px 16px;}
  .tile .n{font-size:28px;font-weight:800;color:var(--navy);}
  .tile .l{font-size:13px;color:#7a8aa0;margin-top:2px;}
  .brow{display:flex;align-items:center;gap:10px;margin:7px 0;}
  .brow .nm{width:110px;font-size:13px;font-weight:600;color:var(--navy);}
  .bar{flex:1;height:14px;background:#e3e8f2;border-radius:999px;overflow:hidden;}
  .bar>i{display:block;height:100%;border-radius:999px;}
  .brow .pc{width:44px;text-align:right;font-size:13px;font-weight:700;}
  table{width:100%;border-collapse:collapse;font-size:14px;margin-top:8px;}
  th{background:var(--navy);color:#fff;padding:8px 10px;text-align:left;font-size:13px;position:sticky;top:0;}
  td{padding:7px 10px;border-bottom:1px solid #eef1f7;}
  tr:nth-child(even) td{background:#fafbfe;}
  .scroll{max-height:340px;overflow:auto;border-radius:10px;border:1px solid #eef1f7;}
  .muted{color:#9aa7ba;} .err{color:#c0392b;font-weight:600;}
  .coment{background:#f7f9fc;border-left:4px solid var(--gold);border-radius:8px;padding:10px 12px;margin:8px 0;font-size:14px;}
  .hidden{display:none;}
</style>
</head>
<body>
<div class="app">
  <div class="hero"><div class="kick">🔒 PANEL PRIVADO DEL PROFESOR</div><h1>Curso de Inducción · Resultados</h1></div>

  <div class="card">
    <div class="cfg">
      <div class="f"><label>URL de tu Apps Script (termina en /exec)</label><input type="text" id="url" placeholder="https://script.google.com/macros/s/…/exec"></div>
      <div class="f" style="max-width:220px;"><label>Tu TOKEN</label><input type="text" id="token" placeholder="saynes-induccion-2026"></div>
      <button class="btn" id="btn-cargar">Cargar datos</button>
    </div>
    <div id="status" class="muted" style="margin-top:10px;font-size:13px;">Pega tu URL y token, guardo la config en este navegador.</div>
  </div>

  <div class="card hidden" id="c-diag">
    <h2>📝 Diagnóstico</h2>
    <div class="tiles" id="diag-tiles"></div>
    <div id="diag-blocks"></div>
    <div class="scroll" id="diag-table"></div>
  </div>

  <div class="card hidden" id="c-enc">
    <h2>📊 Encuesta de satisfacción</h2>
    <div class="tiles" id="enc-tiles"></div>
    <div id="enc-extra"></div>
  </div>
</div>

<script>
const $=id=>document.getElementById(id);
$('url').value=localStorage.getItem('ind_url')||'https://script.google.com/macros/s/AKfycbxG3F7aWe_fGsIVPfvP2v8FAydt1KJxJrkvrYU5SGGInCdLTJDnRFZC9cTiEqw2KGVN/exec';
$('token').value=localStorage.getItem('ind_token')||'';

$('btn-cargar').onclick=function(){
  const url=$('url').value.trim(), token=$('token').value.trim();
  if(!url || url.indexOf('/exec')<0){ setStatus('Pon la URL de tu Apps Script que termina en /exec.',true); return; }
  localStorage.setItem('ind_url',url); localStorage.setItem('ind_token',token);
  setStatus('Cargando…');
  const s=document.createElement('script');
  window.__ind=function(data){ document.body.removeChild(s); render(data); };
  s.src=url+(url.indexOf('?')<0?'?':'&')+'token='+encodeURIComponent(token)+'&callback=__ind';
  s.onerror=function(){ setStatus('No se pudo conectar. Revisa la URL y que la app esté implementada para "Cualquier usuario".',true); };
  document.body.appendChild(s);
};
function setStatus(t,err){ const el=$('status'); el.textContent=t; el.className=err?'err':'muted'; }
if($('url').value && $('token').value) $('btn-cargar').click();

function num(x){ const n=parseFloat(x); return isNaN(n)?0:n; }
function avg(a){ return a.length? a.reduce((s,x)=>s+x,0)/a.length : 0; }

function render(data){
  if(data.error){ setStatus('Token incorrecto. Revisa que coincida con el del Apps Script.',true); return; }
  setStatus('Datos cargados ✓');
  // ---- DIAGNÓSTICO ----
  const D=data.Diagnostico||[];
  if(D.length>1){
    $('c-diag').classList.remove('hidden');
    const rows=D.slice(1);
    const pct=rows.map(r=>num(r[5]));
    const blocks=[6,7,8,9,10,11].map(ci=>Math.round(avg(rows.map(r=>num(r[ci])))));
    const nombresB=['Enteros','Fracciones','Porcentajes','Potencias','Álgebra','Ecuaciones'];
    $('diag-tiles').innerHTML=
      tile(rows.length,'alumnos')+tile(Math.round(avg(pct))+'%','promedio general')+
      tile(Math.min.apply(0,pct)+'%','más bajo')+tile(Math.max.apply(0,pct)+'%','más alto');
    $('diag-blocks').innerHTML='<h2 style="font-size:15px">Dominio promedio por bloque</h2>'+
      blocks.map((p,i)=>bar(nombresB[i],p)).join('');
    let html='<table><tr><th>Fecha</th><th>Nombre</th><th>Grupo</th><th>%</th>'+nombresB.map(n=>'<th>'+n+'</th>').join('')+'</tr>';
    rows.forEach(r=>{ html+='<tr><td>'+fecha(r[0])+'</td><td>'+esc(r[1])+'</td><td>'+esc(r[2])+'</td><td><b>'+r[5]+'%</b></td>'+
      [6,7,8,9,10,11].map(ci=>'<td>'+r[ci]+'%</td>').join('')+'</tr>'; });
    $('diag-table').innerHTML=html+'</table>';
  }
  // ---- ENCUESTA ----
  const E=data.Encuesta||[];
  if(E.length>1){
    $('c-enc').classList.remove('hidden');
    const rows=E.slice(1);
    const util=rows.map(r=>num(r[3])).filter(x=>x>0);
    const dificultad=cuenta(rows.map(r=>r[4]));
    const prep=cuenta(rows.map(r=>r[6]));
    const temas=cuenta(rows.flatMap(r=>String(r[5]||'').split(',').map(s=>s.trim()).filter(Boolean)));
    $('enc-tiles').innerHTML=tile(rows.length,'respuestas')+tile(avg(util).toFixed(1)+' ★','utilidad promedio');
    let extra='<h2 style="font-size:15px">Dificultad percibida</h2>'+distro(dificultad,rows.length);
    extra+='<h2 style="font-size:15px;margin-top:14px">¿Se sienten preparados?</h2>'+distro(prep,rows.length);
    extra+='<h2 style="font-size:15px;margin-top:14px">Temas que más ayudaron</h2>'+distro(temas,rows.length);
    const coments=rows.map(r=>r[7]).filter(c=>String(c).trim());
    if(coments.length){ extra+='<h2 style="font-size:15px;margin-top:14px">Comentarios</h2>'+
      coments.map(c=>'<div class="coment">'+esc(c)+'</div>').join(''); }
    $('enc-extra').innerHTML=extra;
  }
}
function tile(n,l){ return '<div class="tile"><div class="n">'+n+'</div><div class="l">'+l+'</div></div>'; }
function bar(nm,p){ const col=p>=67?'#2e7d32':(p>=34?'#C9A84C':'#c0392b');
  return '<div class="brow"><div class="nm">'+nm+'</div><div class="bar"><i style="width:'+p+'%;background:'+col+'"></i></div><div class="pc" style="color:'+col+'">'+p+'%</div></div>'; }
function cuenta(arr){ const m={}; arr.forEach(function(x){ x=String(x||'').trim(); if(!x)return; m[x]=(m[x]||0)+1; }); return m; }
function distro(m,total){ const ks=Object.keys(m).sort((a,b)=>m[b]-m[a]);
  return ks.map(k=>{ const p=Math.round(m[k]/total*100); return '<div class="brow"><div class="nm" style="width:130px">'+esc(k)+'</div><div class="bar"><i style="width:'+p+'%;background:#274a83"></i></div><div class="pc">'+m[k]+'</div></div>'; }).join('') || '<div class="muted">Sin datos</div>'; }
function fecha(f){ try{ return new Date(f).toLocaleDateString('es-MX',{day:'2-digit',month:'2-digit'}); }catch(e){ return ''; } }
function esc(s){ return String(s==null?'':s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }
</script>
</body>
</html>
